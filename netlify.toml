[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  port    = 4173

# Proxy /api/* to the backend — set BACKEND_URL in Netlify env vars
[[redirects]]
  from   = "/api/*"
  to     = ":BACKEND_URL/api/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
